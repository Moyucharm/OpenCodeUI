name: Build Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri -- build --bundles nsis

      - name: Prepare installer artifact
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release-artifacts
          SETUP=$(find src-tauri/target/release/bundle/nsis -name '*-setup.exe' -type f | head -1)
          if [ -z "$SETUP" ]; then
            echo "NSIS setup.exe not found"
            ls -R src-tauri/target/release/bundle || true
            exit 1
          fi
          cp "$SETUP" "release-artifacts/OpenCode_${VERSION}_x64-setup.exe"
          echo "Prepared: release-artifacts/OpenCode_${VERSION}_x64-setup.exe"
          ls -lh release-artifacts

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenCode-Windows-Setup
          if-no-files-found: error
          path: release-artifacts/*-setup.exe
